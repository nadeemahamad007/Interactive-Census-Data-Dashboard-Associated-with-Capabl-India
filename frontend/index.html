<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Census Data Dashboard for India</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Census Data Dashboard</h1>
    </header>
    <div id="controls">
        <label for="state-select">Select State:</label>
        <select id="state-select"></select>
        <label for="district-select">Select District:</label>
        <select id="district-select"></select>
    </div>
    <div id="visualization"></div>
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
